<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#05010a">
  <title>Offline - Troll City</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg-primary: #05010a;
      --bg-secondary: #0A0814;
      --bg-card: #121212;
      --border-color: #2C2C2C;
      --text-primary: #ffffff;
      --text-secondary: #9ca3af;
      --accent-primary: #7c3aed;
      --accent-secondary: #a855f7;
      --accent-gradient: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
    }
    
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    
    .container {
      max-width: 400px;
      width: 100%;
    }
    
    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 32px;
      background: var(--accent-gradient);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 40px rgba(124, 58, 237, 0.3);
    }
    
    .logo svg {
      width: 64px;
      height: 64px;
      color: white;
    }
    
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      line-height: 1.5;
    }
    
    .offline-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 8px 16px;
      border-radius: 9999px;
      margin-bottom: 32px;
    }
    
    .offline-indicator::before {
      content: '';
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    .offline-indicator span {
      font-size: 14px;
      font-weight: 500;
      color: #ef4444;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .cached-content {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }
    
    .cached-content h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }
    
    .cached-items {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .cached-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(124, 58, 237, 0.1);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text-primary);
      transition: all 0.2s ease;
    }
    
    .cached-item:hover {
      background: rgba(124, 58, 237, 0.2);
    }
    
    .cached-item-icon {
      width: 40px;
      height: 40px;
      background: var(--accent-gradient);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .cached-item-icon svg {
      width: 20px;
      height: 20px;
      color: white;
    }
    
    .cached-item-text {
      text-align: left;
    }
    
    .cached-item-text strong {
      display: block;
      font-size: 14px;
      margin-bottom: 2px;
    }
    
    .cached-item-text span {
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    
    .btn-primary {
      background: var(--accent-gradient);
      color: white;
      box-shadow: 0 4px 14px rgba(124, 58, 237, 0.4);
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5);
    }
    
    .btn-primary:active {
      transform: translateY(0);
    }
    
    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
    }
    
    .status-message {
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-secondary);
      display: none;
    }
    
    .status-message.visible {
      display: block;
    }
    
    .loading-dots {
      display: inline-flex;
      gap: 4px;
      margin-left: 4px;
    }
    
    .loading-dots span {
      width: 4px;
      height: 4px;
      background: currentColor;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    
    .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
    .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    
    @media (max-width: 480px) {
      .logo {
        width: 100px;
        height: 100px;
      }
      
      .logo svg {
        width: 52px;
        height: 52px;
      }
      
      h1 {
        font-size: 24px;
      }
      
      .subtitle {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    
    <h1>You are offline</h1>
    <p class="subtitle">Check your internet connection and try again. Some features may be limited while offline.</p>
    
    <div class="offline-indicator">
      <span>Offline Mode</span>
    </div>
    
    <div class="cached-content">
      <h2>Available Offline</h2>
      <div class="cached-items">
        <a href="/" class="cached-item">
          <div class="cached-item-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
          </div>
          <div class="cached-item-text">
            <strong>City Center</strong>
            <span>Your dashboard</span>
          </div>
        </a>
        
        <a href="/profile" class="cached-item">
          <div class="cached-item-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <div class="cached-item-text">
            <strong>Your Profile</strong>
            <span>Cached profile data</span>
          </div>
        </a>
        
        <a href="/tcps" class="cached-item">
          <div class="cached-item-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <div class="cached-item-text">
            <strong>Messages</strong>
            <span>Cached conversations</span>
          </div>
        </a>
      </div>
    </div>
    
    <div class="actions">
      <button class="btn btn-primary" onclick="tryReconnect()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Try Again
      </button>
      <a href="/" class="btn btn-secondary">Go to Home</a>
    </div>
    
    <p id="status-message" class="status-message">
      Checking connection<span class="loading-dots"><span></span><span></span><span></span></span>
    </p>
  </div>
  
  <script>
    // Check online status
    function updateOnlineStatus() {
      if (navigator.onLine) {
        document.getElementById('status-message').textContent = 'Connection restored! Redirecting...';
        document.getElementById('status-message').classList.add('visible');
        setTimeout(() => {
          window.location.reload();
        }, 1500);
      }
    }
    
    function tryReconnect() {
      const statusEl = document.getElementById('status-message');
      statusEl.classList.add('visible');
      
      // Try to fetch a small resource
      fetch('/favicon.svg', { method: 'HEAD', cache: 'no-store' })
        .then(() => {
          statusEl.textContent = 'Connection restored! Redirecting...';
          setTimeout(() => {
            window.location.reload();
          }, 1000);
        })
        .catch(() => {
          statusEl.textContent = 'Still offline. Please check your connection.';
          setTimeout(() => {
            statusEl.classList.remove('visible');
          }, 3000);
        });
    }
    
    // Listen for online events
    window.addEventListener('online', updateOnlineStatus);
    
    // Check if we came back online while on this page
    if (navigator.onLine) {
      // We might have just come back online, try to reload
      tryReconnect();
    }
  </script>
</body>
</html>
